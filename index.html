<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniMatch — Legal</title>
  <style>
    :root { --pink:#FF4D8D; --purple:#7C4DFF; --bg:#15101F; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card { max-width: 480px; width: 100%; text-align: center; }
    h1 { font-size: 40px; font-weight: 900; margin: 0 0 8px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: rgba(255,255,255,.7); line-height: 1.5; }
    .links { display: flex; flex-direction: column; gap: 12px; margin-top: 28px; }
    a.btn {
      display: block; padding: 16px; border-radius: 28px; text-decoration: none;
      font-weight: 700; color: #fff; background: var(--pink);
    }
    a.btn.alt { background: transparent; border: 2px solid rgba(255,255,255,.25); }
    footer { margin-top: 28px; color: rgba(255,255,255,.35); font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MiniMatch</h1>
    <p>18+ entertainment app by Maesic Studios. Find the legal documents below.</p>
    <div class="links">
      <a class="btn" href="./privacy.html">Privacy Policy</a>
      <a class="btn alt" href="./terms.html">Terms of Use</a>
    </div>
    <footer>For entertainment only · We never store your photos.</footer>
  </div>
</body>
</html>
